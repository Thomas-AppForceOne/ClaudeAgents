name: shared-setup
on:
  workflow_call:
    inputs:
      run:
        required: true
        type: string
jobs:
  setup-and-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.10.0'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: ${{ inputs.run }}
